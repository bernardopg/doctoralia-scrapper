# Overlay de produção. Use junto do compose base:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Diferenças para o base:
#   - Caddy como único ponto de entrada (80/443) com TLS automático.
#   - api/dashboard/n8n deixam de publicar portas no host (só rede interna).
#   - Redis exige senha (REDIS_PASSWORD) e não publica porta.
#   - restart: always em todos os serviços.

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      # Portas do host configuráveis (default 80/443). Útil quando 443
      # já está ocupado no host: defina CADDY_HTTP_PORT/CADDY_HTTPS_PORT.
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
      - N8N_DOMAIN=${N8N_DOMAIN:-n8n.localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - doctoralia-net

  api:
    # Não publica porta no host; acesso só via Caddy na rede interna.
    ports: !reset []
    restart: always
    environment:
      # Redis com senha em produção.
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-doctoralia}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-doctoralia}
    depends_on:
      db:
        condition: service_healthy

  worker:
    restart: always
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-doctoralia}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-doctoralia}
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    ports: !reset []
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-doctoralia}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-doctoralia}
    depends_on:
      db:
        condition: service_healthy

  db-init:
    restart: "no"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-doctoralia}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-doctoralia}

  n8n:
    ports: !reset []
    restart: always
    environment:
      - N8N_PROTOCOL=https
      - N8N_HOST=${N8N_DOMAIN:-n8n.localhost}
      - N8N_EDITOR_BASE_URL=https://${N8N_DOMAIN:-n8n.localhost}
      - WEBHOOK_URL=https://${N8N_DOMAIN:-n8n.localhost}/

  redis:
    # Em produção exige senha e não publica a porta no host.
    ports: !reset []
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]

  selenium:
    ports: !reset []
    restart: always

  db:
    restart: always
    ports: !reset []
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-doctoralia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-doctoralia}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doctoralia} -d ${POSTGRES_DB:-doctoralia}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  caddy-data:
  caddy-config:
  db-data:
