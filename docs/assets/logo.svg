<svg width="920" height="240" viewBox="0 0 920 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Doctoralia Scrapper logo</title>
  <desc id="logoDesc">Custom logo with a speech-bubble medical signal mark and the Doctoralia Scrapper wordmark.</desc>
  <defs>
