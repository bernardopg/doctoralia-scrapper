name: Docker Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [api, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # docker/setup-buildx-action v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # docker/login-action v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # docker/metadata-action v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # docker/build-push-action v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # anchore/sbom-action v0.24.0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          output-file: sbom-${{ matrix.target }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7
        with:
          name: sbom-${{ matrix.target }}
          path: sbom-${{ matrix.target }}.spdx.json

  scan-vulnerabilities:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      matrix:
        target: [api, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # docker/setup-buildx-action v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # docker/login-action v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image to local cache
        if: github.event_name != 'pull_request'
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}:${{ env.IMAGE_TAG }}

      - name: Build local image for PR scan
        if: github.event_name == 'pull_request'
        run: docker build --target ${{ matrix.target }} -t local/${{ matrix.target }}:${{ github.sha }} .

      - name: Run Trivy JSON scan (PR image)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # aquasecurity/trivy-action v0.36.0
        with:
          image-ref: local/${{ matrix.target }}:${{ github.sha }}
          cache: 'false'
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"
          format: "json"
          output: "trivy-results-${{ matrix.target }}.json"

      - name: Run Trivy JSON scan (registry image)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # aquasecurity/trivy-action v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}:${{ env.IMAGE_TAG }}
          cache: 'false'
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"
          format: "json"
          output: "trivy-results-${{ matrix.target }}.json"

      - name: Run Trivy SARIF scan (PR image)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # aquasecurity/trivy-action v0.36.0
        with:
          image-ref: local/${{ matrix.target }}:${{ github.sha }}
          cache: 'false'
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"
          format: "sarif"
          output: "trivy-results-${{ matrix.target }}.sarif"

      - name: Run Trivy SARIF scan (registry image)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # aquasecurity/trivy-action v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}:${{ env.IMAGE_TAG }}
          cache: 'false'
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"
          format: "sarif"
          output: "trivy-results-${{ matrix.target }}.sarif"

      - name: Fail on HIGH/CRITICAL vulnerabilities
        run: |
          set -euo pipefail

          report_file="trivy-results-${{ matrix.target }}.json"
          if [[ ! -f "$report_file" ]]; then
            echo "Trivy report not found: $report_file"
            exit 1
          fi

          vuln_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' "$report_file")
          echo "Detected HIGH/CRITICAL vulnerabilities: $vuln_count"

          if [[ "$vuln_count" -gt 0 ]]; then
            echo "Vulnerabilities found:"
            jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL") | "- [\(.Severity)] \(.PkgName) \(.InstalledVersion) -> \(.VulnerabilityID) (fixed: \(.FixedVersion // "none"))"' "$report_file" | head -n 50
            exit 1
          fi

      - name: Upload Trivy results to GitHub Security
        if: ${{ always() && hashFiles(format('trivy-results-{0}.sarif', matrix.target)) != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # github/codeql-action v4
        with:
          sarif_file: 'trivy-results-${{ matrix.target }}.sarif'
          category: 'trivy-${{ matrix.target }}'

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # docker/login-action v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          cat > .env << EOF
          API_KEY=test-integration-key
          WEBHOOK_SIGNING_SECRET=test-webhook-secret
          REDIS_URL=redis://redis:6379/0
          SELENIUM_REMOTE_URL=http://selenium:4444/wd/hub
          N8N_BASIC_AUTH_ACTIVE=true
          N8N_BASIC_AUTH_USER=ci-admin
          N8N_BASIC_AUTH_PASSWORD=ci-password
          N8N_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          N8N_EDITOR_BASE_URL=http://localhost:5678
          WEBHOOK_URL=http://localhost:5678/
          N8N_DIAGNOSTICS_ENABLED=false
          N8N_VERSION_NOTIFICATIONS_ENABLED=false
          GENERIC_TIMEZONE=America/Sao_Paulo
          EOF

      - name: Pull run images
        if: github.event_name != 'pull_request'
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ env.IMAGE_TAG }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${{ env.IMAGE_TAG }}

      - name: Create docker-compose override for CI images
        if: github.event_name != 'pull_request'
        run: |
          cat > docker-compose.ci.yml << 'EOF'
          services:
            api:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ env.IMAGE_TAG }}
              build: null
            worker:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${{ env.IMAGE_TAG }}
              build: null
          EOF

      - name: Start services (PR build from source)
        if: github.event_name == 'pull_request'
        run: |
          docker compose up -d --build api worker redis
          sleep 15

      - name: Start services (non-PR uses published images)
        if: github.event_name != 'pull_request'
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d api worker redis
          sleep 15

      - name: Check API health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/v1/health 2>/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... (attempt $i/30)"
            sleep 2
          done
          echo "API health check failed"
          docker compose logs api
          exit 1

      - name: Run basic integration tests
        run: |
          echo "Testing health endpoint..."
          curl --connect-timeout 5 --max-time 15 -f http://localhost:8000/v1/health

          echo "Testing API with authentication..."
          curl --connect-timeout 5 --max-time 30 -X POST http://localhost:8000/v1/scrape:run \
            -H "X-API-Key: test-integration-key" \
            -H "Content-Type: application/json" \
            -d '{"doctor_url": "https://www.doctoralia.com.br/medico/test"}' \
            --fail-with-body || echo "Expected to fail without real URL or after timeout"

      - name: Show logs on failure
        if: failure()
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            docker compose logs
          elif [[ -f docker-compose.ci.yml ]]; then
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs
          else
            docker compose logs || true
          fi

      - name: Stop services
        if: always()
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            docker compose down -v || true
          elif [[ -f docker-compose.ci.yml ]]; then
            docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
          else
            docker compose down -v || true
          fi

  all-docker-checks-passed:
    name: All Docker Checks Passed
    runs-on: ubuntu-latest
    needs: [build-and-push, scan-vulnerabilities, integration-test]
    if: always()
    steps:
      - name: Validate workflow result
        run: |
          if [[ "${{ needs.build-and-push.result }}" != "success" ]] || \
             [[ "${{ needs.scan-vulnerabilities.result }}" != "success" ]] || \
             [[ "${{ needs.integration-test.result }}" != "success" ]]; then
            echo "One or more Docker checks failed"
            exit 1
          fi
