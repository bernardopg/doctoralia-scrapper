name: Docker Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [api, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # docker/setup-buildx-action v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # docker/login-action v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # docker/metadata-action v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # docker/build-push-action v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # anchore/sbom-action v0.24.0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          output-file: sbom-${{ matrix.target }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact v7
        with:
          name: sbom-${{ matrix.target }}
          path: sbom-${{ matrix.target }}.spdx.json

  scan-vulnerabilities:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      matrix:
        target: [api, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout v6

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # docker/setup-buildx-action v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # docker/login-action v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image to local cache
        if: github.event_name != 'pull_request'
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}:latest

      - name: Build local image for PR scan
        if: github.event_name == 'pull_request'
        run: docker build --target ${{ matrix.target }} -t local/${{ matrix.target }}:${{ github.sha }} .

      - name: Run Trivy JSON scan (PR image)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # aquasecurity/trivy-action v0.35.0
        with:
          image-ref: local/${{ matrix.target }}:${{ github.sha }}
          cache: 'false'
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"
          format: "json"
          output: "trivy-results-${{ matrix.target }}.json"

      - name: Run Trivy JSON scan (registry image)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # aquasecurity/trivy-action v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}:latest
          cache: 'false'
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"
          format: "json"
          output: "trivy-results-${{ matrix.target }}.json"

      - name: Fail on HIGH/CRITICAL vulnerabilities
        run: |
          report_file="trivy-results-${{ matrix.target }}.json"
          if [[ ! -f "$report_file" ]]; then
            echo "Trivy report not found: $report_file"
            exit 1
          fi

          vuln_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' "$report_file")
          echo "Detected HIGH/CRITICAL vulnerabilities: $vuln_count"

          if [[ "$vuln_count" -gt 0 ]]; then
            echo "Vulnerabilities found:"
            jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL") | "- [\(.Severity)] \(.PkgName) \(.InstalledVersion) -> \(.VulnerabilityID) (fixed: \(.FixedVersion // "none"))"' "$report_file" | head -n 50
            exit 1
          fi

      - name: Run Trivy SARIF scan (PR image)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # aquasecurity/trivy-action v0.35.0
        with:
          image-ref: local/${{ matrix.target }}:${{ github.sha }}
          cache: 'false'
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"
          format: "sarif"
          output: "trivy-results-${{ matrix.target }}.sarif"

      - name: Run Trivy SARIF scan (registry image)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # aquasecurity/trivy-action v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}:latest
          cache: 'false'
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"
          format: "sarif"
          output: "trivy-results-${{ matrix.target }}.sarif"

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # github/codeql-action v4
        with:
          sarif_file: 'trivy-results-${{ matrix.target }}.sarif'
          category: 'trivy-${{ matrix.target }}'

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout v6

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # docker/login-action v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          cat > .env << EOF
          API_KEY=test-integration-key
          WEBHOOK_SIGNING_SECRET=test-webhook-secret
          REDIS_URL=redis://redis:6379/0
          SELENIUM_REMOTE_URL=http://selenium:4444/wd/hub
          N8N_BASIC_AUTH_ACTIVE=true
          N8N_BASIC_AUTH_USER=ci-admin
          N8N_BASIC_AUTH_PASSWORD=ci-password
          N8N_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          N8N_EDITOR_BASE_URL=http://localhost:5678
          WEBHOOK_URL=http://localhost:5678/
          N8N_DIAGNOSTICS_ENABLED=false
          N8N_VERSION_NOTIFICATIONS_ENABLED=false
          GENERIC_TIMEZONE=America/Sao_Paulo
          EOF

      - name: Pull latest images
        if: github.event_name != 'pull_request'
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:latest

      - name: Create docker-compose override for CI images
        if: github.event_name != 'pull_request'
        run: |
          cat > docker-compose.ci.yml << 'EOF'
          services:
            api:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
              build: null
            worker:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:latest
              build: null
          EOF

      - name: Start services (PR build from source)
        if: github.event_name == 'pull_request'
        run: |
          docker compose up -d --build api worker redis
          sleep 15

      - name: Start services (non-PR uses published images)
        if: github.event_name != 'pull_request'
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d api worker redis
          sleep 15

      - name: Check API health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/v1/health 2>/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... (attempt $i/30)"
            sleep 2
          done
          echo "API health check failed"
          docker compose logs api
          exit 1

      - name: Run basic integration tests
        run: |
          echo "Testing health endpoint..."
          curl --connect-timeout 5 --max-time 15 -f http://localhost:8000/v1/health

          echo "Testing API with authentication..."
          curl --connect-timeout 5 --max-time 30 -X POST http://localhost:8000/v1/scrape:run \
            -H "X-API-Key: test-integration-key" \
            -H "Content-Type: application/json" \
            -d '{"doctor_url": "https://www.doctoralia.com.br/medico/test"}' \
            --fail-with-body || echo "Expected to fail without real URL or after timeout"

      - name: Show logs on failure
        if: failure()
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            docker compose logs
          else
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs
          fi

      - name: Stop services
        if: always()
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            docker compose down -v
          else
            docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
          fi

  all-docker-checks-passed:
    name: All Docker Checks Passed
    runs-on: ubuntu-latest
    needs: [build-and-push, scan-vulnerabilities, integration-test]
    if: always()
    steps:
      - name: Validate workflow result
        run: |
          if [[ "${{ needs.build-and-push.result }}" != "success" ]] || \
             [[ "${{ needs.scan-vulnerabilities.result }}" != "success" ]] || \
             [[ "${{ needs.integration-test.result }}" != "success" ]]; then
            echo "One or more Docker checks failed"
            exit 1
          fi
