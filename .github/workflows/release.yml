name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version format: $VERSION"
            echo "Expected semantic version tag like v1.2.3 or v1.2.3-rc.1"
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [ -z "$PREV_TAG" ]; then
              CHANGES=$(git log --pretty=format:"* %s (%h)" --no-merges)
            else
              CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"* %s (%h)" --no-merges)
            fi
          else
            PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)
            if [ -z "$PREV_TAG" ]; then
              CHANGES=$(git log --pretty=format:"* %s (%h)" --no-merges)
            else
              CHANGES=$(git log "${PREV_TAG}..${VERSION}" --pretty=format:"* %s (%h)" --no-merges)
            fi
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES="* No user-facing changes captured."
          fi

          cat > RELEASE_NOTES.md << EOF_NOTES
          # Changelog

          ## ${VERSION}

          ${CHANGES}

          ## Docker Images

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}/api:${VERSION}
          docker pull ghcr.io/${{ github.repository }}/worker:${VERSION}
          \`\`\`

          ## Installation

          \`\`\`bash
          pip install doctoralia-scrapper==${VERSION#v}
          \`\`\`
          EOF_NOTES

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build-and-publish:
    name: Build and Publish Package
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Update version in pyproject.toml
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          poetry version "${VERSION#v}"

      - name: Build package
        run: poetry build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-packages
          path: dist/

      - name: Check PyPI token
        id: check_pypi
        run: |
          if [ -n "$PYPI_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Publish to PyPI
        if: needs.prepare-release.outputs.prerelease == 'false' && steps.check_pypi.outputs.has_token == 'true'
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish --skip-existing

  build-docker:
    name: Build Release Docker Images
    runs-on: ubuntu-latest
    needs: prepare-release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [api, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare-release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-and-publish, build-docker]

    steps:
      - name: Download release notes
        uses: actions/download-artifact@v5
        with:
          name: release-notes
          path: release-notes

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-packages
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          body_path: release-notes/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [prepare-release, build-and-publish, build-docker, create-release]
    if: always()

    steps:
      - name: Check job status
        id: check
        run: |
          if [[ "${{ needs.build-and-publish.result }}" == "success" ]] && \
             [[ "${{ needs.build-docker.result }}" == "success" ]] && \
             [[ "${{ needs.create-release.result }}" == "success" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Version: ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ steps.check.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Docker Images" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${{ github.repository }}/api:${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${{ github.repository }}/worker:${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
