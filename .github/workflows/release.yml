name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing tag to release (for example, v1.0.0)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_no_prefix: ${{ steps.version.outputs.version_no_prefix }}
      tag_sha: ${{ steps.version.outputs.tag_sha }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${VERSION}. Expected vMAJOR.MINOR.PATCH."
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} does not exist in the repository."
            exit 1
          fi

          TAG_SHA="$(git rev-list -n 1 "${VERSION}")"
          VERSION_NO_PREFIX="${VERSION#v}"
          IS_PRERELEASE=false

          if [[ "${VERSION}" == *-* ]]; then
            IS_PRERELEASE=true
          fi

          {
            echo "version=${VERSION}"
            echo "version_no_prefix=${VERSION_NO_PREFIX}"
            echo "tag_sha=${TAG_SHA}"
            echo "is_prerelease=${IS_PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag_sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # snok/install-poetry v1
        with:
          version: "2.2.1"

      - name: Set package version
        run: poetry version ${{ needs.prepare.outputs.version_no_prefix }}

      - name: Build package
        run: poetry build

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  build-docker:
    name: Build Release Docker Images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [api, worker]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # docker/setup-buildx-action v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # docker/login-action v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # docker/metadata-action v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.target }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # docker/build-push-action v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify published Docker tags
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_NO_PREFIX: ${{ needs.prepare.outputs.version_no_prefix }}
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.target }}
        run: |
          set -euo pipefail

          docker buildx imagetools inspect "${IMAGE}:${VERSION}" >/dev/null
          docker buildx imagetools inspect "${IMAGE}:${VERSION_NO_PREFIX}" >/dev/null

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [prepare, build-package, build-docker]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag_sha }}

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: dist
          path: dist/

      - name: Check PyPI publishing eligibility
        id: pypi
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${{ needs.prepare.outputs.is_prerelease }}" == "true" ]]; then
            echo "publish=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping PyPI publish for prerelease."
            exit 0
          fi

          if [[ -z "${PYPI_TOKEN}" ]]; then
            echo "publish=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping PyPI publish because PYPI_TOKEN is not configured."
            exit 0
          fi

          echo "publish=true" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        if: steps.pypi.outputs.publish == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        if: steps.pypi.outputs.publish == 'true'
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # snok/install-poetry v1
        with:
          version: "2.2.1"

      - name: Install twine
        if: steps.pypi.outputs.publish == 'true'
        run: pip install twine

      - name: Publish to PyPI
        if: steps.pypi.outputs.publish == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-package, build-docker, publish-pypi]
    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag_sha }}
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate changelog
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_NO_PREFIX: ${{ needs.prepare.outputs.version_no_prefix }}
        run: |
          set -euo pipefail

          PREV_TAG="$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)"

          if [[ -z "${PREV_TAG}" ]]; then
            CHANGES="$(git log --pretty=format:"* %s (%h)" --no-merges "${VERSION}")"
          else
            CHANGES="$(git log "${PREV_TAG}..${VERSION}" --pretty=format:"* %s (%h)" --no-merges)"
          fi

          cat > CHANGELOG.txt <<EOF
          # Changelog

          ## ${VERSION}

          ${CHANGES}

          ## Docker Images

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}/api:${VERSION}
          docker pull ghcr.io/${{ github.repository }}/worker:${VERSION}
          \`\`\`

          Also available without the v prefix:

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}/api:${VERSION_NO_PREFIX}
          docker pull ghcr.io/${{ github.repository }}/worker:${VERSION_NO_PREFIX}
          \`\`\`

          ## Installation

          \`\`\`bash
          pip install doctoralia-scrapper==${VERSION_NO_PREFIX}
          \`\`\`
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          if gh release view "${VERSION}" >/dev/null 2>&1; then
            edit_args=(
              release edit "${VERSION}"
              --title "Release ${VERSION}"
              --notes-file CHANGELOG.txt
              --draft=false
            )

            if [[ "${IS_PRERELEASE}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi

            gh "${edit_args[@]}"
          else
            create_args=(
              release create "${VERSION}"
              --title "Release ${VERSION}"
              --notes-file CHANGELOG.txt
              --verify-tag
            )

            if [[ "${IS_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease --latest=false)
            fi

            gh "${create_args[@]}"
          fi

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release upload "${{ needs.prepare.outputs.version }}" \
            dist/*.whl \
            dist/*.tar.gz \
            --clobber

      - name: Summary
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "### Version: ${{ needs.prepare.outputs.version }}"
            echo ""
            echo "**Status:** success"
            echo ""
            echo "### Docker Images"
            echo "\`\`\`"
            echo "ghcr.io/${{ github.repository }}/api:${{ needs.prepare.outputs.version }}"
            echo "ghcr.io/${{ github.repository }}/worker:${{ needs.prepare.outputs.version }}"
            echo "\`\`\`"
          } >> "${GITHUB_STEP_SUMMARY}"
