name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Markdown renderer
        run: python -m pip install --quiet markdown

      - name: Generate static pages
        run: |
          python - <<'PY'
          from html import escape
          from pathlib import Path

          import markdown

          root = Path(".")
          site = root / "site"
          site.mkdir(parents=True, exist_ok=True)

          sources = [root / "README.md"] + sorted((root / "docs").glob("*.md"))
          pages = []
          for src in sources:
              if not src.exists():
                  continue
              if src.name.lower() == "readme.md":
                  output_name = "index.html"
                  title = "Home"
              else:
                  output_name = f"{src.stem}.html"
                  title = src.stem.replace("-", " ").title()
              pages.append((src, title, output_name))

          if not pages:
              raise RuntimeError("No markdown files found to publish.")

          for src, title, output_name in pages:
              html_body = markdown.markdown(
                  src.read_text(encoding="utf-8"),
                  extensions=["fenced_code", "tables", "toc"],
              )

              nav_items = []
              for _, nav_title, nav_output in pages:
                  active = " class='active'" if nav_output == output_name else ""
                  nav_items.append(
                      f"<li><a{active} href='{escape(nav_output)}'>{escape(nav_title)}</a></li>"
                  )

              page_html = f"""<!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>{escape(title)} · Doctoralia Scrapper Docs</title>
              <style>
                body {{
                  margin: 0;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  background: #f6f8fa;
                  color: #24292f;
                }}
                .wrap {{
                  max-width: 1100px;
                  margin: 0 auto;
                  padding: 24px;
                  display: grid;
                  grid-template-columns: 260px 1fr;
                  gap: 24px;
                }}
                nav {{
                  background: #fff;
                  border: 1px solid #d0d7de;
                  border-radius: 8px;
                  padding: 16px;
                  height: fit-content;
                }}
                nav ul {{
                  list-style: none;
                  margin: 0;
                  padding: 0;
                }}
                nav a {{
                  color: #0969da;
                  text-decoration: none;
                  display: block;
                  padding: 6px 0;
                }}
                nav a.active {{
                  font-weight: 700;
                  color: #1f2328;
                }}
                main {{
                  background: #fff;
                  border: 1px solid #d0d7de;
                  border-radius: 8px;
                  padding: 28px;
                  overflow-wrap: anywhere;
                }}
                pre {{
                  overflow-x: auto;
                  background: #f6f8fa;
                  border: 1px solid #d0d7de;
                  border-radius: 6px;
                  padding: 12px;
                }}
                code {{
                  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                }}
                img {{
                  max-width: 100%;
                }}
                @media (max-width: 900px) {{
                  .wrap {{
                    grid-template-columns: 1fr;
                  }}
                }}
              </style>
            </head>
            <body>
              <div class="wrap">
                <nav>
                  <strong>Documentation</strong>
                  <ul>{''.join(nav_items)}</ul>
                </nav>
                <main>{html_body}</main>
              </div>
            </body>
          </html>
          """
              (site / output_name).write_text(page_html, encoding="utf-8")

          (site / ".nojekyll").write_text("", encoding="utf-8")
          print(f"Generated {len(pages)} HTML pages in {site}")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
