name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: Enable auto-merge on Dependabot PRs
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # actions/github-script v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const initialPr = context.payload.pull_request;

            if (initialPr.base.ref !== "main") {
              core.info(`Skipping PR #${initialPr.number}: base branch is ${initialPr.base.ref}.`);
              return;
            }

            async function waitForStablePullRequest(pullNumber, attempts = 6, delayMs = 5000) {
              let currentPr = initialPr;

              for (let attempt = 1; attempt <= attempts; attempt += 1) {
                const { data } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: pullNumber,
                });
                currentPr = data;

                core.info(
                  `Attempt ${attempt}/${attempts}: mergeable=${currentPr.mergeable} mergeable_state=${currentPr.mergeable_state}`
                );

                if (
                  currentPr.mergeable !== null &&
                  !["unknown", "unstable"].includes(currentPr.mergeable_state)
                ) {
                  return currentPr;
                }

                if (attempt < attempts) {
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                }
              }

              return currentPr;
            }

            const pr = await waitForStablePullRequest(initialPr.number);

            if (pr.mergeable_state === "behind") {
              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                  expected_head_sha: pr.head.sha,
                });
                core.info(`Updated branch for PR #${pr.number}. Waiting for the synchronize event to retry auto-merge.`);
              } catch (error) {
                core.warning(`Could not update branch for PR #${pr.number}: ${error.message}`);
              }
              return;
            }

            if (pr.mergeable === null || ["unknown", "unstable"].includes(pr.mergeable_state)) {
              core.warning(`Skipping PR #${pr.number}: mergeable state is still ${pr.mergeable_state}.`);
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }
                  ) {
                    clientMutationId
                  }
                }`,
                { pullRequestId: pr.node_id }
              );
              core.info(`Auto-merge enabled for PR #${pr.number}.`);
            } catch (error) {
              if ((error.message || "").includes("already enabled")) {
                core.info(`Auto-merge is already enabled for PR #${pr.number}.`);
                return;
              }
              if ((error.message || "").includes("unstable status")) {
                core.warning(`Skipping PR #${pr.number}: GitHub still reports the pull request as unstable.`);
                return;
              }
              throw error;
            }
