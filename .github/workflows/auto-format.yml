name: Auto Format PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "**/*.py"
      - "pyproject.toml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-format:
    name: Apply Black and isort
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Format Python sources
        run: |
          poetry run black --target-version py310 --target-version py311 src/ tests/ config/ scripts/
          poetry run isort src/ tests/ config/ scripts/

      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ tests/ config/ scripts/
          git commit -m "style: auto-format Python sources"
          git push
