<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#146C94"/>
      <stop offset="100%" stop-color="#0d4f6e"/>
    </linearGradient>
    <linearGradient id="logo-dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#168C61"/>
      <stop offset="100%" stop-color="#0f6347"/>
    </linearGradient>
    <filter id="logo-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="8" width="144" height="144" rx="32" ry="32" fill="url(#logo-bg)"/>

  <!-- ECG wave (scaled to 144×144 box, centered at y=80) -->
  <path
    d="M 14 80
       L 40 80
       L 48 62
       L 56 98
       L 66 42
       L 76 118
       L 83 68
       L 90 80
       L 100 80
       L 106 80"
    fill="none"
    stroke="white"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"
  />

  <!-- Data point -->
  <circle cx="119" cy="80" r="14" fill="url(#logo-dot)" filter="url(#logo-glow)"/>
  <circle cx="115" cy="76" r="4.5" fill="white" opacity="0.35"/>

  <!-- Tail -->
  <path d="M 133 80 L 144 80" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- Text: "Doctoralia" -->
  <text
    x="168"
    y="68"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="40"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#146C94"
  >Doctoralia</text>

  <!-- Text: "Scrapper" -->
  <text
    x="170"
    y="112"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="4"
    fill="#168C61"
  >SCRAPPER</text>
</svg>
